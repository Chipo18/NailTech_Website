{% extends "base.html" %}
{% block title %}Edit Service{% endblock %}

{% block content %}
<h1>Edit Service</h1>
<form method="POST">
  <div class="mb-3">
    <label for="name" class="form-label">Service Name</label>
    <input type="text" class="form-control" name="name" value="{{ service.name }}" required>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea class="form-control" name="description">{{ service.description }}</textarea>
  </div>
  <div class="mb-3">
    <label for="price" class="form-label">Price (k)</label>
    <input type="number" step="0.01" class="form-control" name="price" value="{{ service.price }}" required>
  </div>
  <div class="mb-3">
    <label for="image_url" class="form-label">Image URL</label>
    <input type="text" class="form-control" name="image_url" value="{{ service.image_url }}">
  </div>
  <button type="submit" class="btn btn-primary">Update Service</button>
  <a href="{{ url_for('views.admin') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
