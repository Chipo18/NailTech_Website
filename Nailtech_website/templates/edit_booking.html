{% extends "base.html" %}
{% block title %}Edit Booking{% endblock %}

{% block content %}
<h2>Edit Booking</h2>
<form method="POST">
  <div class="mb-3">
    <label for="date" class="form-label">Date</label>
    <input type="date" id="date" name="date" class="form-control" value="{{ booking_date }}" required>
  </div>
  <div class="mb-3">
    <label for="time" class="form-label">Time</label>
    <input type="time" id="time" name="time" class="form-control" value="{{ booking_time }}" required>
  </div>
  <div class="mb-3">
    <label for="contact_info" class="form-label">Contact Info</label>
    <input type="text" id="contact_info" name="contact_info" class="form-control" value="{{ booking.contact_info }}" required>
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{{ url_for('views.admin_bookings') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
